<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olivia Xie</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--accent2:#bc8cff;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#db6d28;
  --sidebar-w:230px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden}
.sidebar{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;display:flex;flex-direction:column}
.main{overflow-y:auto;background:var(--bg)}
/* Sidebar */
.sb-persona{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-avatar{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1f6feb,#6e40c9);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.sb-name{font-size:13px;font-weight:700;line-height:1.2}
.sb-sub{font-size:11px;color:var(--muted);line-height:1.3;margin-top:1px}
.sb-section{padding:10px 16px 3px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:13px;
  color:var(--muted);transition:color 0.1s,background 0.1s;user-select:none;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{background:rgba(88,166,255,0.08);color:var(--accent);font-weight:600;border-left-color:var(--accent)}
.nav-emoji{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-count{margin-left:auto;font-size:11px;background:var(--surface2);border-radius:10px;
  padding:1px 7px;color:var(--muted);flex-shrink:0}
.nav-item.active .nav-count{background:rgba(88,166,255,0.15);color:var(--accent)}
/* Panels */
.panel{display:none;padding:24px;min-height:100%}
.panel.active{display:block}
.panel-title{font-size:20px;font-weight:800;margin-bottom:4px}
.panel-sub{color:var(--muted);font-size:13px;margin-bottom:20px}
/* Overview */
.ov-persona-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:20px;margin-bottom:20px;display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start}
.ov-avatar{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,#1f6feb,#6e40c9);
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff}
.ov-name{font-size:22px;font-weight:800;margin-bottom:4px}
.ov-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.ov-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:4px 10px;font-size:12px;cursor:pointer;transition:border-color 0.15s}
.ov-chip:hover{border-color:var(--accent)}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.ov-card-title{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:12px;font-weight:700}
.tension-row{padding:8px 10px;border-left:3px solid;background:var(--surface2);
  border-radius:0 5px 5px 0;margin-bottom:6px}
.tension-row .t-num{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.tension-row .t-title{font-size:12px;font-weight:600;margin-top:1px}
.person-row{display:flex;align-items:center;gap:10px;padding:6px 0;
  border-bottom:1px solid var(--border);cursor:pointer}
.person-row:last-child{border-bottom:none}
.pa{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.ov-scale{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.scale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:12px}
.scale-tile{background:var(--surface2);border-radius:6px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s;border:1px solid transparent}
.scale-tile:hover{border-color:var(--accent)}
.scale-tile .s-emoji{font-size:20px;margin-bottom:4px}
.scale-tile .s-count{font-size:18px;font-weight:800}
.scale-tile .s-label{font-size:11px;color:var(--muted)}
/* Email */
.email-thread{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.thread-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.1s}
.thread-header:hover{background:var(--surface2)}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.unread-dot.read{background:transparent;border:1px solid var(--border)}
.thread-subj{font-size:14px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.thread-subj.has-unread{font-weight:700;color:var(--text)}
.thread-subj.all-read{font-weight:400;color:var(--muted)}
.thread-meta{font-size:12px;color:var(--muted);white-space:nowrap}
.thread-badge{background:var(--surface2);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--muted)}
.unread-badge{background:var(--accent);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:6px}
.thread-body{display:none;border-top:1px solid var(--border)}
.thread-body.open{display:block}
.email-msg{padding:16px;border-bottom:1px solid var(--border)}
.email-msg:last-child{border-bottom:none}
.email-msg.unread{background:rgba(88,166,255,0.04)}
.email-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.email-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.email-sender-name{font-size:13px;font-weight:600}
.email-sender-addr{font-size:11px;color:var(--muted)}
.email-time{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
.email-body{font-size:13px;line-height:1.7;white-space:pre-wrap;background:var(--surface2);
  padding:12px;border-radius:6px}
.email-attach{margin-top:8px;font-size:11px;color:var(--muted)}
/* Calendar */
.cal-wrap{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-nav h2{font-size:18px;font-weight:800;min-width:190px;text-align:center}
.cal-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text);font-size:18px;line-height:1;transition:border-color 0.1s}
.cal-btn:hover{border-color:var(--accent)}
.cal-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-wday{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{min-height:88px;background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:4px;cursor:pointer;transition:border-color 0.1s;overflow:hidden;position:relative}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell:not(.empty):hover{border-color:var(--accent)}
.cal-cell.sel{border-color:var(--accent);background:rgba(88,166,255,0.08)}
.cal-cell.today{border-color:var(--green)}
.cal-day-n{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:2px}
.cal-cell.has-ev .cal-day-n{color:var(--text)}
.ev-pill{font-size:10px;font-weight:500;padding:1px 4px;border-radius:3px;
  margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.ev-more{font-size:10px;color:var(--muted);margin-top:1px}
/* Tag pill colors */
.t-work{background:rgba(31,111,235,0.25);color:#79c0ff}
.t-health{background:rgba(35,134,54,0.25);color:#56d364}
.t-personal{background:rgba(110,64,201,0.25);color:#bc8cff}
.t-family{background:rgba(158,106,3,0.25);color:#e3b341}
.t-creative{background:rgba(163,25,91,0.25);color:#f778ba}
.t-legal{background:rgba(189,86,29,0.25);color:#ffa657}
.t-custody{background:rgba(218,54,51,0.25);color:#ff7b72}
.t-social{background:rgba(26,127,100,0.25);color:#39d353}
.t-fitness{background:rgba(46,160,67,0.25);color:#56d364}
.t-other{background:rgba(72,79,88,0.25);color:#8b949e}
/* Cal detail sidebar */
.cal-detail{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;position:sticky;top:0;max-height:calc(100vh - 100px);overflow-y:auto}
.cal-detail-hdr{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.ev-card{margin-bottom:10px;padding:10px 12px;border-radius:6px;border-left:3px solid;background:var(--surface2)}
.ev-card-time{font-size:11px;color:var(--muted);margin-bottom:2px}
.ev-card-title{font-size:13px;font-weight:600}
.ev-card-sub{font-size:11px;color:var(--muted);margin-top:3px}
/* border colors by tag */
.bw{border-color:#1f6feb}.bh{border-color:#238636}.bp{border-color:#6e40c9}
.bf{border-color:#9e6a03}.bc{border-color:#a3195b}.bl{border-color:#bd561d}
.bcu{border-color:#da3633}.bs{border-color:#1a7f64}.bfit{border-color:#2ea043}.bo{border-color:#484f58}
/* Messaging */
.msg-layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 90px);
  background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.conv-list{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.conv-list-hdr{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;
  font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);flex-shrink:0}
.conv-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s}
.conv-item:hover{background:var(--surface2)}
.conv-item.active{background:rgba(88,166,255,0.08);border-right:2px solid var(--accent)}
.conv-title{font-size:13px;font-weight:600;margin-bottom:3px}
.conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:11px;color:var(--muted);float:right;margin-top:1px}
.msg-pane{display:flex;flex-direction:column;overflow:hidden}
.msg-pane-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-size:15px;font-weight:700;flex-shrink:0}
.msg-pane-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.bubble-wrap{display:flex;flex-direction:column;max-width:72%}
.bubble-wrap.sent{align-self:flex-end;align-items:flex-end}
.bubble-wrap.recv{align-self:flex-start;align-items:flex-start}
.bubble-meta{font-size:11px;color:var(--muted);margin-bottom:3px}
.bubble{padding:9px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.bubble.sent{background:#1f6feb;color:#fff;border-bottom-right-radius:4px}
.bubble.recv{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
/* Contacts */
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;cursor:pointer;transition:border-color 0.15s,transform 0.1s}
.ccard:hover{border-color:var(--accent);transform:translateY(-1px)}
.ccard-hdr{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.cavatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.cname{font-size:14px;font-weight:700}
.cjob{font-size:12px;color:var(--muted)}
.cdetail{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.you-badge{display:inline-block;font-size:10px;background:rgba(88,166,255,0.15);
  color:var(--accent);padding:1px 6px;border-radius:10px;font-weight:700;margin-top:4px}
/* Contact modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:24px;max-width:500px;width:92%;max-height:82vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.close-x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;padding:2px 8px;border-radius:4px}
.close-x:hover{color:var(--text)}
.fp{display:grid;grid-template-columns:110px 1fr;gap:4px 12px;font-size:13px;margin-bottom:6px}
.fl{color:var(--muted);font-weight:600}
.desc-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:12px;font-size:12px;line-height:1.7;margin-top:10px;white-space:pre-wrap}
/* Strava */
.act-list{display:flex;flex-direction:column;gap:8px}
.act-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:start}
.act-card.late{border-left:3px solid var(--red)}
.act-icon{font-size:20px;margin-top:2px}
.act-name{font-size:14px;font-weight:600}
.act-date{font-size:12px;color:var(--muted);margin-top:1px}
.act-stats{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
.stat{font-size:12px;color:var(--muted)}
.stat strong{color:var(--text)}
/* Fintrack */
.acc-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.acc-tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all 0.15s}
.acc-tab.active{background:rgba(88,166,255,0.1);border-color:var(--accent);color:var(--accent)}
.acc-summary{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.acc-bal{font-size:24px;font-weight:800}
.txn-table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.txn-row{display:grid;grid-template-columns:96px 1fr 100px 90px;gap:12px;
  padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.txn-row:last-child{border-bottom:none}
.txn-row:hover{background:var(--surface2)}
.txn-hdr{background:var(--surface2);font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.6px;color:var(--muted)}
.txn-date{color:var(--muted)}
.txn-merch{font-weight:500}
.txn-cat{font-size:11px;color:var(--muted)}
.txn-amt{font-weight:700;text-align:right}
.txn-amt.cr{color:var(--green)}.txn-amt.dr{color:var(--red)}
/* Generic */
.gen-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
.gen-sec-title{padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted)}
.gen-rec{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
.gen-rec:last-child{border-bottom:none}
.route-tl.open,.n-body.open,.ic-items.open{display:block !important}
.gen-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:3px 14px}
.gf-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.gf-val{font-size:12px;word-break:break-word}
.gf-val.muted{color:var(--muted)}
/* Markdown */
.md-body{max-width:820px;font-size:14px;line-height:1.75}
.md-body h1{font-size:22px;font-weight:800;margin:0 0 16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.md-body h2{font-size:17px;font-weight:700;margin:24px 0 10px;color:var(--accent);padding-bottom:6px;border-bottom:1px solid var(--border)}
.md-body h3{font-size:14px;font-weight:700;margin:16px 0 6px;color:var(--accent2)}
.md-body p{margin-bottom:10px}
.md-body ul,.md-body ol{padding-left:20px;margin-bottom:10px}
.md-body li{margin-bottom:4px}
.md-body strong{font-weight:700}
.md-body em{font-style:italic;color:var(--muted)}
.md-body code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:12px;font-family:ui-monospace,monospace}
.md-body table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}
.md-body th{background:var(--surface2);padding:8px 12px;text-align:left;font-size:11px;
  font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.md-body td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.md-body hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.md-body blockquote{border-left:3px solid var(--accent);padding:8px 16px;background:var(--surface2);border-radius:0 6px 6px 0;margin:8px 0}
/* Utils */
.muted{color:var(--muted)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">

<div class="sidebar">
  <div class="sb-persona">
    <div class="sb-avatar">OX</div>
    <div>
      <div class="sb-name">Olivia Xie</div>
      <div class="sb-sub"></div>
    </div>
  </div>
  <div style="padding-bottom:16px">
    <div class="nav-item active" data-nav="overview"><span class="nav-emoji">🏠</span> Overview</div>
    <div class="sb-section">Data</div>
    <div id="data-nav-items"></div>
    <div class="sb-section">Docs</div>
    <div class="nav-item" data-nav="memory"><span class="nav-emoji">🧠</span> Memory </div>
<div class="nav-item" data-nav="tensions"><span class="nav-emoji">⚠️</span> Tensions <span class="nav-count">7</span></div>
<div class="nav-item" data-nav="storylines"><span class="nav-emoji">📖</span> Storylines </div>
<div class="nav-item" data-nav="npcs"><span class="nav-emoji">🤝</span> Relationships </div>

  </div>
</div>

<div class="main">
  <div class="panel active" id="panel-overview">
    <div id="ov-content"></div>
  </div>
  <div class="panel" id="panel-server">
    <div class="panel-title" id="sv-title"></div>
    <div class="panel-sub" id="sv-sub"></div>
    <div id="sv-content"></div>
  </div>
  <div class="panel" id="panel-memory"><div id="md-memory"></div></div>
  <div class="panel" id="panel-tensions"><div id="md-tensions"></div></div>
  <div class="panel" id="panel-storylines"><div id="md-storylines"></div></div>
  <div class="panel" id="panel-npcs"><div id="md-npcs"></div></div>
</div>

</div>

<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="modal" id="modal-body" onclick="event.stopPropagation()"></div>
</div>
